<title>UFC Owner Sim</title>
<style>
  :root{

    --txt:#e9e9ee; --txt2:#9aa0ad; --txt3:#666c79;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
  body{padding-bottom:64px;}
  h1,h2,h3,h4{margin:.3em 0; font-weight:700;}
  h1{font-size:1.3rem} h2{font-size:1.1rem} h3{font-size:1rem} h4{font-size:.9rem;color:var(--txt2)}
  a{color:var(--blue)}
  .topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg2),var(--bg2) 90%,transparent);
    padding:10px 12px 6px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .topbar .brand{font-weight:800;letter-spacing:.5px;color:var(--red)}
  .topbar .date{font-size:.8rem;color:var(--txt2)}
  .container{padding:10px 10px 90px}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
  .card.tight{padding:8px}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .row > *{flex:1}
  .btn{display:inline-block;background:var(--bg3);border:1px solid var(--line);color:var(--txt);
    padding:9px 12px;border-radius:9px;font-size:.85rem;cursor:pointer;text-align:center;user-select:none}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--red);border-color:var(--red2);color:#fff;font-weight:700}
  .btn.green{background:#1f3d2c;border-color:var(--green);color:var(--green)}
  .btn.gold{background:#3a2f12;border-color:var(--gold);color:var(--gold)}
  .btn.small{padding:5px 9px;font-size:.75rem}
  .btn.full{width:100%}
  .btn.danger{background:#3a1414;border-color:var(--red);color:#ff8a8a}
  .btn[disabled]{opacity:.35;pointer-events:none}
  input,select,textarea{background:var(--bg3);border:1px solid var(--line);color:var(--txt);border-radius:8px;
    padding:8px;font-size:.85rem;width:100%;margin:3px 0;font-family:inherit}
  label{font-size:.75rem;color:var(--txt2);display:block;margin-top:6px}
  table{width:100%;border-collapse:collapse;font-size:.8rem}
  th,td{padding:6px 4px;border-bottom:1px solid var(--line);text-align:left}
  th{color:var(--txt2);font-weight:600;font-size:.72rem;text-transform:uppercase}
  tr.clickable{cursor:pointer}
  tr.clickable:active{background:var(--bg3)}
  .pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.7rem;font-weight:700;background:var(--bg3);border:1px solid var(--line)}
  .pill.champ{background:#3a2f12;color:var(--gold);border-color:var(--gold)}
  .pill.interim{background:#2a2640;color:#b79bff;border-color:#7d5fff}
  .pill.retired{background:#2a2a2a;color:#888}
  .pill.injured{background:#3a1414;color:#ff8a8a;border-color:#b44}
  .pill.hof{background:#102a3a;color:#6fc8ff;border-color:#3a7da8}
  .muted{color:var(--txt2);font-size:.78rem}
  .tabs{display:flex;overflow-x:auto;gap:6px;padding:8px 10px;background:var(--bg2);border-bottom:1px solid var(--line);
    position:sticky;top:46px;z-index:19}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;padding:7px 12px;border-radius:99px;background:var(--bg3);font-size:.78rem;white-space:nowrap;border:1px solid var(--line)}
  .tab.active{background:var(--red);border-color:var(--red2);color:#fff;font-weight:700}
  .statbar{height:6px;border-radius:99px;background:var(--bg3);overflow:hidden;margin-top:2px}
  .statbar i{display:block;height:100%;background:var(--blue)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .fightcard-item{border:1px solid var(--line);border-radius:10px;padding:8px;margin-bottom:6px;background:var(--bg3)}
  .vs{font-weight:800;color:var(--red);text-align:center;font-size:.75rem}
  .log{font-size:.78rem;color:var(--txt2);max-height:220px;overflow-y:auto;border-top:1px solid var(--line);padding-top:6px}
  .log div{margin-bottom:4px}
  .closebtn{position:absolute;top:10px;right:10px}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;align-items:flex-end}
  .modal{background:var(--bg2);width:100%;max-height:88vh;overflow-y:auto;border-radius:16px 16px 0 0;padding:14px;position:relative;border-top:1px solid var(--line)}
  .badge-row{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0}
  .section-title{display:flex;justify-content:space-between;align-items:center}
  textarea.code{font-family:monospace;font-size:.72rem;min-height:300px;white-space:pre}
  .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--gold);
    padding:8px 14px;border-radius:10px;font-size:.8rem;z-index:99;max-width:90vw;text-align:center}
  .fighterImg{display:block;max-width:200px;width:100%;margin:0 auto 10px;border-radius:12px;border:1px solid var(--line);background:var(--bg3)}
  .hofBadge{background:linear-gradient(90deg,#7a5c00,#d4af37,#7a5c00);color:#1a1300;font-weight:800;text-align:center;
    padding:8px 10px;border-radius:8px;margin:6px 0 10px;letter-spacing:.5px;font-size:.85rem;box-shadow:0 0 12px rgba(212,175,55,.5)}
</style>
</head>

/* ====================== UTILIDADES ====================== */
function uid(p){return p+'_'+Math.random().toString(36).slice(2,9);}
function rand(min,max){return Math.random()*(max-min)+min;}
function randi(min,max){return Math.floor(rand(min,max+1));}
function pick(arr){return arr[randi(0,arr.length-1)];}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function fmtDate(d){ if(!d) return '-'; const dt=new Date(d); return dt.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});}
function addDays(dateStr,days){ const d=new Date(dateStr); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10);}
function ageFromDob(dob, ref){ const a=new Date(ref); const b=new Date(dob); let age=a.getFullYear()-b.getFullYear(); const m=a.getMonth()-b.getMonth(); if(m<0||(m===0&&a.getDate()<b.getDate())) age--; return age;}
function toast(msg,ms=2400){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),ms);}
function divName(id){ const d=DIVISIONS.find(x=>x.id===id); return d? (d.gender==='F'?'♀ ':'♂ ')+d.name : id; }

function logEvent(msg){

}

/* ====================== GENERACIÓN DE PELEADORES SEED ====================== */
function makeFighter(divisionId, gender){
  const first = gender==='F'? pick(FIRST_F): pick(FIRST_M);
  const last = pick(LAST);
  const age = randi(22,33);
  const dob = `${2026-age}-${String(randi(1,12)).padStart(2,'0')}-${String(randi(1,28)).padStart(2,'0')}`;
  const debutYearsAgo = randi(2,9);
  const debut = `${2026-debutYearsAgo}-0${randi(1,9)}-1${randi(0,9)}`;
  const stats = {};
  STAT_KEYS.forEach(([k])=> stats[k]=randi(45,88));
  // un par de fighters con algo de tope alto para que el roster tenga variedad
  if(Math.random()<0.3){ const boost=pick(STAT_KEYS)[0]; stats[boost]=clamp(stats[boost]+randi(8,14),1,99); }
  return {
    id: uid('F'),
    name: `${first} ${last}`,
    nickname: pick(NICK_POOL),
    gender, country: pick(COUNTRIES),
    dob, debut,
    division: divisionId,
    stats,
    longevity: randi(82,100),
    status:'active', // active | retired | injured
    injury:{active:false, untilDate:null, note:''},
    record:{wins:0,losses:0,draws:0,nc:0,koWins:0,subWins:0,decWins:0,koLosses:0,subLosses:0,decLosses:0,ufcFights:0,ufcWins:0,ufcLosses:0,ufcKoWins:0,ufcSubWins:0,ufcDecWins:0,ufcKoLosses:0,ufcSubLosses:0,ufcDecLosses:0},
    imageUrl:null,
    bonuses:{fightOfNight:0, performanceOfNight:0},
    titleReigns:[], // {titleId, wonDate, lostDate, defenses}
    fightHistory:[], // fightIds
    lastEventSeq:null,
    hof:false,
    rankScore:0
  };
}

const TIER_RANGES = {
  legend:[78,95], elite:[74,90], contender:[65,82], veteran:[60,78]
};

function makeRealFighter(rf){
  const range = TIER_RANGES[rf.tier]||[60,80];
  const stats={};
  STAT_KEYS.forEach(([k])=> stats[k]=randi(range[0],range[1]));
  const longevity = rf.status==='retired'? randi(0,25) : randi(55,100);
  return {
    id: uid('F'), name:rf.name, nickname:rf.nickname, gender:rf.gender, country:rf.country,
    dob:rf.dob, debut:rf.debut, division:rf.division, stats, longevity,
    status: rf.status==='retired'?'retired':'active',
    injury:{active:false, untilDate:null, note:''},
    record: {wins:0,losses:0,draws:0,nc:0,koWins:0,subWins:0,decWins:0,koLosses:0,subLosses:0,decLosses:0},
    bonuses:{fightOfNight:0, performanceOfNight:0},
    titleReigns:[], fightHistory:[], lastEventSeq:null,
    hof: false,
    rankScore:0,
    _tier: rf.tier
  };
}
function STAT_KEYS_BONUS_CAP(tier){ return {legend:9, elite:5, contender:2, veteran:3}[tier]||1; }

function seedFighters(){
  if(typeof INITIAL_STATE!=='undefined' && INITIAL_STATE){
    // Cargar el estado importado por el usuario (peleadores reales con récord, peleas UFC y campeones)
    const imported = JSON.parse(JSON.stringify(INITIAL_STATE));
    STATE.fighters = imported.fighters;
    STATE.titles = imported.titles;
    STATE.divisions = imported.divisions;
    STATE.meta = {...STATE.meta, ...imported.meta};
    // saneo: asegurar que todo peleador tiene los campos nuevos (ufcFights, imageUrl)
    STATE.fighters.forEach(f=>{
      f.record = f.record || {};
      if(f.record.ufcFights==null) f.record.ufcFights = (f.record.wins||0)+(f.record.losses||0)+(f.record.draws||0)+(f.record.nc||0);
      if(f.record.ufcWins==null) f.record.ufcWins = Math.min(f.record.wins||0, f.record.ufcFights);
      if(f.record.ufcLosses==null) f.record.ufcLosses = Math.min(f.record.losses||0, Math.max(0,f.record.ufcFights-f.record.ufcWins));
      if(f.record.ufcKoWins==null) f.record.ufcKoWins = f.record.koWins||0;
      if(f.record.ufcSubWins==null) f.record.ufcSubWins = f.record.subWins||0;
      if(f.record.ufcDecWins==null) f.record.ufcDecWins = f.record.decWins||0;
      if(f.record.ufcKoLosses==null) f.record.ufcKoLosses = f.record.koLosses||0;
      if(f.record.ufcSubLosses==null) f.record.ufcSubLosses = f.record.subLosses||0;
      if(f.record.ufcDecLosses==null) f.record.ufcDecLosses = f.record.decLosses||0;
      if(f.imageUrl===undefined) f.imageUrl = null;
    });
  } else {
    STATE.fighters = REAL_FIGHTERS.map(makeRealFighter);
  }
  // si alguna categoría se quedara con menos de 2 peleadores, se completa con generados aleatoriamente
  DIVISIONS.forEach(div=>{
    const count = STATE.fighters.filter(f=>f.division===div.id).length;
    for(let i=count;i<2;i++) STATE.fighters.push(makeFighter(div.id, div.gender));
  });
  // asegurar que existen los títulos de división + BMF (por si el estado importado no los trae todos)
  DIVISIONS.forEach(d=>{
    if(!STATE.titles.find(t=>t.divisionId===d.id)){
      STATE.titles.push({id: uid('T'), name: `Cinturón de ${divName(d.id)}`, divisionId:d.id, holderId:null, isInterim:false, history:[]});
    }
  });
  if(!STATE.titles.find(t=>t.divisionId===null)){
    STATE.titles.push({id:uid('T'), name:'Cinturón BMF', divisionId:null, holderId:null, isInterim:false, history:[]});
  }
  STATE.divisions.forEach(d=>{
    const t = STATE.titles.find(x=>x.divisionId===d.id);
    d.championId = t? t.holderId : null;
  });

  logEvent(`Liga inicializada con ${STATE.fighters.length} peleadores.`);
  saveLocal();
}

/* ====================== MOTOR DE SIMULACIÓN ====================== */
// Estima el % de victoria simulando el combate muchas veces con el mismo motor real (round a round),
// no con una comparación de nivel general. Así el striker con buena TDD, el pegador con poco nivel
// general pero mucho KO, el wrestler de control, etc. se reflejan correctamente en el marchmaking.
function winProbabilities(fA, fB, rounds=3){
  const N = 250;
  let winsA = 0;
  for(let i=0;i<N;i++){
    if(simulateFight(fA, fB, {rounds}).winner===fA) winsA++;
  }
  const probA = clamp(winsA/N*100, 3, 97);
  return {probA, probB: 100-probA};
}
function overallRating(f){
  const s=f.stats;
  let base = s.power*0.15 + s.striking*0.22 + s.wrestlingOff*0.14 + s.wrestlingDef*0.12 + s.ground*0.15 + s.cardio*0.12 + s.chin*0.10;
  base *= (f.longevity/100)*0.25 + 0.75; // el desgaste resta un poco de rendimiento
  return base;
}

// Simulación round a round: cada asalto es un enfrentamiento de golpeo, derribos y suelo entre los
// atributos concretos de cada peleador (no solo una media general). Esto permite que un pegador con
// poco "nivel total" pueda noquear en cualquier momento (puncher's chance), que un buen wrestler
// neutralice a un mejor striker llevándolo al suelo, que el cardio decida los asaltos tardíos, que
// un buen chin permita sobrevivir y ganar por decisión, y que un striker puro gane por decisión solo
// con volumen/daño de pie sin necesidad de derribar ni controlar en el suelo nunca.
function simulateFight(fA, fB, opts={}){
  const rounds = opts.rounds || 3;
  let roundsA=0, roundsB=0;
  let dmgA=0, dmgB=0; // daño acumulado recibido (reduce el chin efectivo con el paso de los asaltos)
  let result=null;

  for(let r=1; r<=rounds; r++){
    // el cardio bajo hace que el rendimiento caiga en asaltos avanzados ("se vacía el tanque")
    const fatigue = f => 1 - Math.max(0,r-1) * (1-(f.stats.cardio/100)) * 0.09;
    const fatA = fatigue(fA), fatB = fatigue(fB);
    // el chin efectivo baja con el daño acumulado: cuanto más golpeado, más vulnerable al KO
    const effChin = (f,dmg) => f.stats.chin * (1 - clamp(dmg/160, 0, 0.55));

    // --- intercambio de golpeo: potencia + técnica vs aguante efectivo del rival ---
    const strikeA = (fA.stats.striking*0.55 + fA.stats.power*0.45) * fatA * (0.8+Math.random()*0.4);
    const strikeB = (fB.stats.striking*0.55 + fB.stats.power*0.45) * fatB * (0.8+Math.random()*0.4);

    // --- intentos de derribo: ofensiva de wrestling vs defensa de wrestling rival ---
    const tdA = fA.stats.wrestlingOff*fatA*(0.85+Math.random()*0.3) > fB.stats.wrestlingDef*(0.9+Math.random()*0.3);
    const tdB = fB.stats.wrestlingOff*fatB*(0.85+Math.random()*0.3) > fA.stats.wrestlingDef*(0.9+Math.random()*0.3);

    // calidad de control real una vez en el suelo (un derribo "de paso" no es lo mismo que dominar)
    const controlQuality = (attacker, defenderWD) => clamp((attacker.stats.ground*0.6 + attacker.stats.wrestlingOff*0.4 - defenderWD*0.7)/45, 0.15, 1);
    const controlA = tdA? 6 + controlQuality(fA, fB.stats.wrestlingDef)*14 : 0;
    const controlB = tdB? 6 + controlQuality(fB, fA.stats.wrestlingDef)*14 : 0;

    // las peleas a 5 asaltos (título/estelar) suelen ser entre peleadores más completos y duraderos;
    // se reduce ligeramente la probabilidad de finalización por asalto para que no se dispare solo por tener más rounds
    const roundScale = rounds>=5? 0.8 : 1;
    const koChanceA  = clamp((strikeA - effChin(fB,dmgB))/95, 0, 0.14) * roundScale; // "puncher's chance": no depende del nivel general
    const koChanceB  = clamp((strikeB - effChin(fA,dmgA))/95, 0, 0.14) * roundScale;
    const subChanceA = tdA? clamp((fA.stats.ground - fB.stats.wrestlingDef*0.55)/110, 0, 0.10) * roundScale : 0; // solo si hubo derribo
    const subChanceB = tdB? clamp((fB.stats.ground - fA.stats.wrestlingDef*0.55)/110, 0, 0.10) * roundScale : 0;

    const roll = Math.random();
    let cum=0, picked=null;
    for(const [k,p] of [['koA',koChanceA],['koB',koChanceB],['subA',subChanceA],['subB',subChanceB]]){
      cum += p;
      if(roll < cum){ picked = k; break; }
    }

    if(picked){
      const time = `${randi(0,4)}:${String(randi(0,59)).padStart(2,'0')}`;
      if(picked==='koA')  result = {winner:fA, loser:fB, method:'KO/TKO', round:r, time};
      if(picked==='koB')  result = {winner:fB, loser:fA, method:'KO/TKO', round:r, time};
      if(picked==='subA') result = {winner:fA, loser:fB, method:'Sumisión', round:r, time};
      if(picked==='subB') result = {winner:fB, loser:fA, method:'Sumisión', round:r, time};
      break;
    }

    // sin finalización este asalto: el daño se acumula (afecta a los siguientes asaltos)
    dmgA += strikeB*0.18 + (tdB?4:0);
    dmgB += strikeA*0.18 + (tdA?4:0);

    // puntuación del asalto (estilo tarjetas de jueces): daño efectivo propio, algo de resta por el daño
    // recibido, y control real en el suelo si lo hubo. Un striker puro que nunca derriba ni es derribado
    // puede ganar el asalto perfectamente solo con volumen/daño limpio de pie.
    const scoreA = strikeA*0.85 - strikeB*0.10 + controlA;
    const scoreB = strikeB*0.85 - strikeA*0.10 + controlB;
    if(scoreA>scoreB) roundsA++;
    else if(scoreB>scoreA) roundsB++;
    else { if(Math.random()<0.5) roundsA++; else roundsB++; }
  }

  if(!result){
    const winner = roundsA>=roundsB? fA: fB;
    const loser = winner===fA? fB: fA;
    result = {winner, loser, method:'Decisión', round:rounds, time:'5:00'};
  }

  // qué tan reñido/espectacular fue, para los bonos de la noche
  const close = result.method==='Decisión'
    ? Math.abs(roundsA-roundsB)<=1
    : result.round >= Math.ceil(rounds*0.6); // finalización tardía = desgaste mutuo = pelea vistosa
  const fightOfNightChance = result.method==='Decisión'? (close?0.22:0.08) : (close?0.18:0.06);
  const performanceChance = result.method!=='Decisión'? (result.round<=2?0.32:0.22) : 0.02;

  return {...result, rounds, fightOfNight: Math.random()<fightOfNightChance, performance: Math.random()<performanceChance};
}

/* ====================== LESIONES / LONGEVIDAD / RETIRO ====================== */
function applyPostFightWearAndInjury(fighter, won, method, eventDate){
  // desgaste de longevidad
  let wear = randi(1,3);
  if(method==='KO/TKO' && !won) wear += randi(2,5);
  if(method!=='Decisión') wear += randi(0,2);
  fighter.longevity = clamp(fighter.longevity-wear, 0, 100);

  // lesión aleatoria
  const injuryChance = 0.07 + (method==='KO/TKO' && !won? 0.05:0);
  if(Math.random()<injuryChance){
    const days = randi(45,260);
    fighter.injury = {active:true, untilDate: addDays(eventDate, days), note: pick(['Lesión de rodilla','Lesión de hombro','Fractura de mano','Conmoción / protocolo médico','Lesión de tobillo','Desgarro muscular'])};
    fighter.status='injured';
    logEvent(`🩹 ${fighter.name} sufre una lesión (${fighter.injury.note}) y estará fuera hasta ${fmtDate(fighter.injury.untilDate)}.`);
  }

  // retiro
  const age = ageFromDob(fighter.dob, eventDate);
  let retireProb = 0;
  if(age>=39) retireProb += 0.35;
  else if(age>=36) retireProb += 0.16;
  else if(age>=33) retireProb += 0.05;
  if(fighter.longevity<=15) retireProb += 0.45;
  else if(fighter.longevity<=30) retireProb += 0.2;
  else if(fighter.longevity<=45) retireProb += 0.08;
  if(!won && method==='KO/TKO') retireProb += 0.04;
  retireProb = clamp(retireProb,0,0.9);
  if(fighter.status!=='retired' && Math.random()<retireProb){
    fighter.status='retired';
    logEvent(`👋 ${fighter.name} (${age} años) anuncia su retirada tras el combate.`);
    const wantsHof = confirm(`${fighter.name} se retira (${fighter.record.wins}-${fighter.record.losses}, GOAT score ${goatScore(fighter)}).\n\n¿Quieres añadirlo al Hall of Fame?`);
    if(wantsHof){
      fighter.hof = true;
      logEvent(`🏛 ${fighter.name} es inducido al Hall of Fame.`);
    }
  }
}

/* ====================== RANKINGS ====================== */
// Victorias y derrotas EN LA UFC: se usan exclusivamente para los cálculos de ranking (P4P, por categoría y GOAT).
// El récord total (incluyendo otras promotoras) se sigue mostrando tal cual en el perfil, pero no se usa para valorar.
function ufcWinsOf(f){ return f.record.ufcWins!=null? f.record.ufcWins : f.record.wins; }
function ufcLossesOf(f){ return f.record.ufcLosses!=null? f.record.ufcLosses : f.record.losses; }
function ufcKoWinsOf(f){ return f.record.ufcKoWins!=null? f.record.ufcKoWins : f.record.koWins; }
function ufcSubWinsOf(f){ return f.record.ufcSubWins!=null? f.record.ufcSubWins : f.record.subWins; }
function ufcDecWinsOf(f){ return f.record.ufcDecWins!=null? f.record.ufcDecWins : f.record.decWins; }
// Divisiones distintas en las que el peleador ha sido campeón (para valorar campeones multi-división)
function titleDivisionsCount(f){
  const divs = new Set();
  (f.titleReigns||[]).forEach(r=>{
    const t = STATE.titles.find(x=>x.id===r.titleId);
    if(t && t.divisionId) divs.add(t.divisionId);
  });
  return divs.size;
}
function totalDefenses(f){ return (f.titleReigns||[]).reduce((a,t)=>a+(t.defenses||0),0); }
function totalReignsCount(f){ return (f.titleReigns||[]).length; }

function computeBaseScore(f){
  const r=f.record;
  const wins = ufcWinsOf(f);
  const losses = ufcLossesOf(f);
  let score = wins*2.4 - losses*1.5 + ufcKoWinsOf(f)*0.5 + ufcSubWinsOf(f)*0.5 + f.bonuses.performanceOfNight*0.8 + f.bonuses.fightOfNight*0.5;
  if(isChampion(f.id)) score += 18;
  if(isInterimChampion(f.id)) score += 10;
  score += totalDefenses(f)*4;
  score += totalReignsCount(f)*5;
  const multiDiv = titleDivisionsCount(f);
  if(multiDiv>1) score += (multiDiv-1)*25; // bonus extra por ser campeón en más de un peso
  // penalizar inactividad
  const inactivity = f.lastEventSeq!=null? (STATE.meta.eventSeq - f.lastEventSeq) : 2;
  score -= inactivity*0.4;
  return score;
}
function isChampion(fid){ return STATE.titles.some(t=>!t.isInterim && t.holderId===fid && !t.id.startsWith('BMF_NEVER')); }
function isInterimChampion(fid){ return STATE.titles.some(t=>t.isInterim && t.holderId===fid); }
// Icono según importancia del título: los títulos "minor" (tipo BMF) usan un icono distinto a un campeonato indiscutido real
function titleIcon(t){ return (t && t.kind==='minor') ? '🥉' : '🏆'; }
function championBadge(fid){
  const t = STATE.titles.find(x=>x.holderId===fid && !x.isInterim);
  if(t) return ' '+titleIcon(t);
  const ti = STATE.titles.find(x=>x.holderId===fid && x.isInterim);
  if(ti) return ' 🥈';
  return '';
}
// Atributo "General": media de los 7 atributos físicos, solo a efecto visual/comparativo
function generalScore(f){
  const vals = STAT_KEYS.map(([k])=>f.stats[k]);
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}

// Últimos N combates resueltos de un peleador (más reciente primero), con su rival y si ganó
function recentResolvedFights(f, n){
  const history = [...(f.fightHistory||[])].reverse();
  const out=[];
  for(const fid of history){
    if(out.length>=n) break;
    let found=null, foundEv=null;
    for(const ev of STATE.events){ const ft=ev.card.find(x=>x.id===fid); if(ft&&ft.result){found=ft;foundEv=ev;break;} }
    if(!found) continue;
    const oppId = found.result.winnerId===f.id? found.result.loserId : found.result.winnerId;
    const opp = STATE.fighters.find(x=>x.id===oppId);
    if(!opp) continue;
    out.push({opp, won: found.result.winnerId===f.id, date: foundEv? foundEv.date : null});
  }
  return out;
}

// Ajuste por "calidad de rival" en combates recientes (estilo ranking real de la UFC):
// vencer a alguien mejor valorado que tú te adelanta en la clasificación; perder contra alguien peor valorado te penaliza más.
// Solo afecta a P4P / categoría (no al GOAT histórico). Se ponderan los últimos 5 combates, dando más peso al más reciente.
const FORM_WEIGHTS = [1.0, 0.7, 0.5, 0.35, 0.25];
function qualityAdjustment(f, baseMap){
  const myBase = baseMap.get(f.id) ?? 0;
  const fights = recentResolvedFights(f, FORM_WEIGHTS.length);
  let adj = 0;
  fights.forEach((res, idx)=>{
    const w = FORM_WEIGHTS[idx] ?? 0.15;
    const oppBase = baseMap.get(res.opp.id) ?? 0;
    const diff = oppBase - myBase; // positivo = el rival estaba mejor valorado que tú
    if(res.won){
      adj += w * clamp(diff, 0, 60) * 0.9; // victoria de calidad: te adelanta
      if(diff<0) adj += w * 1.5; // ganar a cualquiera, aunque esté peor valorado, suma un poco
    } else {
      adj -= w * clamp(-diff, 0, 60) * 1.1; // perder contra alguien peor valorado duele mucho
      if(diff>0) adj -= w * 1.5; // perder, aunque sea contra alguien mejor, también resta un poco
    }
  });
  return adj;
}

function refreshRankings(){
  // Paso 1: puntuación base (récord UFC, títulos, defensas, multi-división, inactividad)
  STATE.fighters.forEach(f=> f._baseScore = computeBaseScore(f));
  const baseMap = new Map(STATE.fighters.map(f=>[f.id, f._baseScore]));
  // Paso 2: ajuste por calidad de rivales recientes (efecto "leapfrog" realista)
  STATE.fighters.forEach(f=>{
    f.rankScore = f._baseScore + qualityAdjustment(f, baseMap);
  });
}

function divisionTop15(divId){
  return STATE.fighters.filter(f=>f.division===divId && f.status!=='retired')
    .sort((a,b)=>{
      const am=a.manualRankDivision, bm=b.manualRankDivision;
      if(am!=null && bm!=null) return am-bm;
      if(am!=null) return -1;
      if(bm!=null) return 1;
      return b.rankScore-a.rankScore;
    }).slice(0,15);
}
function p4pTop15(){
  return STATE.fighters.filter(f=>f.status==='active' || f.status==='injured')
    .sort((a,b)=>{
      const am=a.manualRankP4P, bm=b.manualRankP4P;
      if(am!=null && bm!=null) return am-bm;
      if(am!=null) return -1;
      if(bm!=null) return 1;
      return b.rankScore-a.rankScore;
    }).slice(0,15);
}

/* ====================== GOAT SCORE ====================== */
// El GOAT score prioriza con fuerza ser campeón, las defensas, los reinados y el multi-división.
// Solo se usan las victorias y derrotas EN LA UFC (campo editable); el resto de la carrera no puntúa aquí.
// Un reinado o defensa INTERINA vale menos que uno indiscutido (cinturón real), porque históricamente
// el título interino es un escalón por debajo del campeonato indiscutido.
const INTERIM_WEIGHT = 0.5; // un reinado/defensa interino vale el 50% de uno indiscutido
function goatScore(f){
  const r=f.record;
  const reigns=(f.titleReigns||[]);
  const wins = ufcWinsOf(f);
  const losses = ufcLossesOf(f);
  const multiDiv = titleDivisionsCount(f);

  let weightedReigns = 0, weightedDefenses = 0, weightedTitleDays = 0;
  reigns.forEach(t=>{
    const w = t.isInterim? INTERIM_WEIGHT : 1;
    weightedReigns += w;
    weightedDefenses += (t.defenses||0) * w;
    const end = t.lostDate || STATE.meta.currentDate;
    const days = Math.max(0, (new Date(end)-new Date(t.wonDate))/(1000*3600*24));
    weightedTitleDays += days * w;
  });

  let score = wins*1.4 - losses*1.0 + ufcKoWinsOf(f)*0.4 + ufcSubWinsOf(f)*0.4 +
    weightedDefenses*12 + weightedReigns*14 + weightedTitleDays*0.02 +
    f.bonuses.performanceOfNight*1.2 + f.bonuses.fightOfNight*0.8;
  if(multiDiv>1) score += (multiDiv-1)*25; // bonus por campeón en más de una categoría (valioso, pero no debe pesar más que defender el título muchas veces)
  // Sin haber sido campeón nunca (ni siquiera interino), el legado pesa mucho menos
  if(reigns.length===0) score *= 0.45;
  return Math.round(score);
}


/* ====================== EVENTOS / CARTELERA ====================== */
function fighterAvailable(f){
  if(f.status==='retired') return false;
  if(f.status==='injured'){
    if(!f.injury.active) return true;
    if(new Date(f.injury.untilDate) <= new Date(STATE.meta.currentDate)) return true;
    return false;
  }
  // cooldown realista: mínimo de meses entre peleas según historial
  if(f.lastEventSeq!=null){
    // Buscar la fecha del último evento en que peleó
    const lastEv = STATE.events.find(e=>e.seq===f.lastEventSeq && e.status==='completed');
    if(lastEv){
      const daysSinceLast = (new Date(STATE.meta.currentDate) - new Date(lastEv.date)) / 86400000;
      // Mínimo 3 meses (90 días) entre peleas; si el peleador tiene poca longevidad, necesita más descanso
      const minDays = f.longevity > 60 ? 90 : (f.longevity > 30 ? 120 : 150);
      if(daysSinceLast < minDays) return false;
    }
  }
  return true;
}

function createEvent(name, date){
  const ev = {id:uid('E'), seq:STATE.meta.eventSeq, name, date, status:'scheduled', card:[]};
  STATE.events.push(ev);
  STATE.meta.eventSeq++;
  saveLocal();
  return ev;
}

function addFightToEvent(ev, fAId, fBId, titleId=null, isInterim=false, isMain=false){
  ev.card.push({id:uid('FT'), fighterA:fAId, fighterB:fBId, titleId, isInterim, isMain, result:null});
}

function simulateEvent(ev){
  if(ev.status==='completed') return;
  // ordenar: main event al final de simulación (para mostrar primero en UI da igual)
  ev.card.forEach(fight=>{
    const fA = STATE.fighters.find(x=>x.id===fight.fighterA);
    const fB = STATE.fighters.find(x=>x.id===fight.fighterB);
    if(!fA||!fB) return;
    const isTitle = !!fight.titleId;
    const result = simulateFight(fA, fB, {rounds: isTitle?5:3});
    const winner=result.winner, loser=result.loser;

    // récords
    winner.record.wins++; loser.record.losses++;
    winner.record.ufcFights = (winner.record.ufcFights||0)+1;
    loser.record.ufcFights = (loser.record.ufcFights||0)+1;
    winner.record.ufcWins = (winner.record.ufcWins||0)+1;
    loser.record.ufcLosses = (loser.record.ufcLosses||0)+1;
    if(result.method==='KO/TKO'){winner.record.koWins++; loser.record.koLosses++; winner.record.ufcKoWins=(winner.record.ufcKoWins||0)+1; loser.record.ufcKoLosses=(loser.record.ufcKoLosses||0)+1;}
    if(result.method==='Sumisión'){winner.record.subWins++; loser.record.subLosses++; winner.record.ufcSubWins=(winner.record.ufcSubWins||0)+1; loser.record.ufcSubLosses=(loser.record.ufcSubLosses||0)+1;}
    if(result.method==='Decisión'){winner.record.decWins++; loser.record.decLosses++; winner.record.ufcDecWins=(winner.record.ufcDecWins||0)+1; loser.record.ufcDecLosses=(loser.record.ufcDecLosses||0)+1;}
    if(result.performance){ winner.bonuses.performanceOfNight++; }
    // El bono FOTN se asigna una sola vez al final del evento, no aquí individualmente

    fight.result = {
      winnerId:winner.id, loserId:loser.id, method:result.method, round:result.round, time:result.time,
      fightOfNight:result.fightOfNight, performance:result.performance
    };

    [fA,fB].forEach(f=>{ f.fightHistory.push(fight.id); f.lastEventSeq=ev.seq; });

    // título
    if(isTitle){
      const title = STATE.titles.find(t=>t.id===fight.titleId);
      if(title){
        const prevHolder = title.holderId;
        if(winner.id!==prevHolder){
          // cierra reinado anterior si lo había
          if(prevHolder){
            const pf = STATE.fighters.find(x=>x.id===prevHolder);
            if(pf){ const reign=(pf.titleReigns||[]).find(r=>r.titleId===title.id && !r.lostDate); if(reign) reign.lostDate=ev.date; }
          }
          title.holderId = winner.id;
          title.isInterim = fight.isInterim;
          winner.titleReigns = winner.titleReigns||[];
          winner.titleReigns.push({titleId:title.id, wonDate:ev.date, lostDate:null, defenses:0});
          title.history.push({fighterId:winner.id, wonEventId:ev.id, wonDate:ev.date});
          logEvent(`${titleIcon(title)} ${winner.name} se proclama ${fight.isInterim?'campeón interino':'campeón'} de ${title.name}!`);
          if(!fight.isInterim){
            // si gana el título indiscutido siendo antes interino en otra pelea de unificación, limpiar interino
          }
        } else {
          // defensa
          const reign=(winner.titleReigns||[]).find(r=>r.titleId===title.id && !r.lostDate);
          if(reign) reign.defenses=(reign.defenses||0)+1;
          logEvent(`🛡️ ${winner.name} defiende con éxito ${title.name} (defensa nº ${reign?reign.defenses:'?'}).`);
        }
      }
    }

    applyPostFightWearAndInjury(winner, true, result.method, ev.date);
    applyPostFightWearAndInjury(loser, false, result.method, ev.date);

    logEvent(`🥊 ${winner.name} derrota a ${loser.name} por ${result.method} (R${result.round}, ${result.time})${isTitle?' — combate de título':''}`);
  });
  ev.status='completed';

  // Premio FOTN: exactamente UNA pelea de la noche por evento
  // Se elige la pelea con mayor puntuación de entretenimiento (no-decisión, reñida, o decisión ajustada)
  const completedFights = ev.card.filter(ft=>ft.result);
  if(completedFights.length > 0){
    // Calcular puntuación de entretenimiento para cada combate
    const fotnScores = completedFights.map(ft=>{
      const r=ft.result;
      const fA=STATE.fighters.find(x=>x.id===ft.fighterA);
      const fB=STATE.fighters.find(x=>x.id===ft.fighterB);
      let score = Math.random()*30; // componente aleatoria
      if(r.method==='KO/TKO') score += 40;
      else if(r.method==='Sumisión') score += 30;
      else score += 10; // decisión es menos emocionante
      // pelea reñida (ratings similares) suma puntos
      if(fA&&fB){
        const diff=Math.abs(overallRating(fA)-overallRating(fB));
        score += Math.max(0, 20-diff*2);
      }
      // si ya fue marcada como fightOfNight en la simulación individual, bonus
      if(r.fightOfNight) score += 20;
      return {ft, score};
    });
    fotnScores.sort((a,b)=>b.score-a.score);
    const fotnFight = fotnScores[0].ft;
    const fotnWinner=STATE.fighters.find(x=>x.id===fotnFight.result.winnerId);
    const fotnLoser=STATE.fighters.find(x=>x.id===fotnFight.result.loserId);
    // Asignar bono FOTN a ambos peleadores de esa pelea
    if(fotnWinner) fotnWinner.bonuses.fightOfNight++;
    if(fotnLoser) fotnLoser.bonuses.fightOfNight++;
    fotnFight.result.isFOTN = true;
    ev.fotnFightId = fotnFight.id;
    logEvent(`🌟 FOTN: ${fotnWinner?fotnWinner.name:'?'} vs ${fotnLoser?fotnLoser.name:'?'} gana el premio Pelea de la Noche de ${ev.name}.`);
  }

  refreshRankings();
  saveLocal();
}

/* ====================== INTERINO POR LESIÓN DE CAMPEÓN ====================== */
function vacateTitleForInjury(titleId){
  const title = STATE.titles.find(t=>t.id===titleId);
  if(!title || !title.holderId) return;
  const f = STATE.fighters.find(x=>x.id===title.holderId);
  if(f){ const reign=(f.titleReigns||[]).find(r=>r.titleId===title.id && !r.lostDate); if(reign) reign.lostDate=STATE.meta.currentDate; }
  logEvent(`⚠️ ${title.name} queda vacante (campeón lesionado/retirado).`);
  title.holderId=null; title.isInterim=false;
  saveLocal();
}

/* ====================== RENDER: SHELL ====================== */
const TABS = [
  ['dashboard','Inicio'],['roster','Roster'],['rankings','Rankings'],['titles','Títulos'],
  ['events','Eventos'],['stats','Estadísticas'],['activity','Actividad'],['hof','Hall of Fame'],
  ['editor','Editor'],['settings','GitHub']
];

function renderShell(){
  document.getElementById('topDate').textContent = '📅 ' + fmtDate(STATE.meta.currentDate);
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = TABS.map(([id,label])=>`<div class="tab ${UI.tab===id?'active':''}" data-tab="${id}">${label}</div>`).join('');
  tabsEl.querySelectorAll('.tab').forEach(t=> t.onclick=()=>{ UI.tab=t.dataset.tab; render(); });
  renderTab();
}

function render(){ renderShell(); }

function renderTab(){
  const app=document.getElementById('app');
  refreshRankings();
  switch(UI.tab){
    case 'dashboard': app.innerHTML=tplDashboard(); bindDashboard(); break;
    case 'roster': app.innerHTML=tplRoster(); bindRoster(); break;
    case 'rankings': app.innerHTML=tplRankings(); bindRankings(); break;
    case 'titles': app.innerHTML=tplTitles(); bindTitles(); break;
    case 'events': app.innerHTML=tplEvents(); bindEvents(); break;
    case 'stats': app.innerHTML=tplStats(); bindStats(); break;
    case 'activity': app.innerHTML=tplActivity(); break;
    case 'hof': app.innerHTML=tplHof(); bindHof(); break;
    case 'editor': app.innerHTML=tplEditor(); bindEditor(); break;
    case 'settings': app.innerHTML=tplSettings(); bindSettings(); break;
  }
}

      <div class="card tight"><div class="muted">Lesionados</div><h3>${injured}</h3></div>

    </div>

      <button class="btn" id="setDate">Fijar fecha</button>

function bindDashboard(){
  const go=document.getElementById('goEvent'); if(go) go.onclick=()=>{UI.tab='events'; render();};

}

/* ====================== ROSTER ====================== */
function fighterStatusPill(f){
  if(f.status==='retired') return `<span class="pill retired">Retirado</span>`;
  if(f.status==='injured') return `<span class="pill injured">Lesionado</span>`;
  if(isChampion(f.id)) return `<span class="pill champ">Campeón</span>`;
  if(isInterimChampion(f.id)) return `<span class="pill interim">Interino</span>`;
  return `<span class="pill">Activo</span>`;
}

function tplRoster(){
  const opts = `<option value="ALL">Todas las categorías</option>` + DIVISIONS.map(d=>`<option value="${d.id}">${divName(d.id)}</option>`).join('');
  let list = STATE.fighters.slice();
  if(UI.rosterFilter!=='ALL') list=list.filter(f=>f.division===UI.rosterFilter);
  if(UI.rosterSearch) list=list.filter(f=>f.name.toLowerCase().includes(UI.rosterSearch.toLowerCase()));
  list.sort((a,b)=>b.rankScore-a.rankScore);
  return `
  <div class="card">
    <h2>Roster (${STATE.fighters.length})</h2>
    <select id="fDiv">${opts}</select>
    <input id="fSearch" placeholder="Buscar peleador..." value="${UI.rosterSearch}">
  </div>
  <div class="card">
    <table><thead><tr><th>Nombre</th><th>Div.</th><th>Récord</th><th>Estado</th></tr></thead>
    <tbody>
    ${list.map(f=>`<tr class="clickable" data-id="${f.id}">
      <td>${f.name}${f.hof?' <span class="pill hof">HOF</span>':''}</td>
      <td style="font-size:.72rem">${divName(f.division).replace('♀ ','♀').replace('♂ ','♂')}</td>
      <td>${f.record.wins}-${f.record.losses}-${f.record.draws}</td>
      <td>${fighterStatusPill(f)}</td>
    </tr>`).join('')}
    </tbody></table>
  </div>
  `;
}
function bindRoster(){
  document.getElementById('fDiv').value=UI.rosterFilter;
  document.getElementById('fDiv').onchange=e=>{UI.rosterFilter=e.target.value; render();};
  document.getElementById('fSearch').oninput=e=>{UI.rosterSearch=e.target.value; renderTab();};
  document.querySelectorAll('tr[data-id]').forEach(tr=> tr.onclick=()=> openFighterModal(tr.dataset.id));
}

function openFighterModal(fid){
  const f = STATE.fighters.find(x=>x.id===fid); if(!f) return;
  const age = ageFromDob(f.dob, STATE.meta.currentDate);
  const reigns = (f.titleReigns||[]).map(r=>{
    const t=STATE.titles.find(x=>x.id===r.titleId);
    return `<div>${titleIcon(t)} ${t?t.name:'?'}${r.isInterim?' <span class="pill interim">Interino</span>':''} — desde ${fmtDate(r.wonDate)}${r.lostDate?` hasta ${fmtDate(r.lostDate)}`:' (vigente)'} · ${r.defenses||0} defensas</div>`;
  }).join('') || '<p class="muted">Sin reinados de título.</p>';
  const fights = f.fightHistory.slice(-10).reverse().map(fid2=>{
    let found=null;
    for(const ev of STATE.events){ const ft=ev.card.find(x=>x.id===fid2); if(ft){found={ev,ft};break;} }
    if(!found || !found.ft.result) return '';
    const r=found.ft.result; const opp = STATE.fighters.find(x=>x.id===(r.winnerId===f.id?r.loserId:r.winnerId));
    const won = r.winnerId===f.id;
    return `<div>${won?'✅':'❌'} vs ${opp?opp.name:'?'} — ${r.method} R${r.round} (${fmtDate(found.ev.date)})</div>`;
  }).join('') || '<p class="muted">Sin combates.</p>';

  document.getElementById('modalRoot').innerHTML = `
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <button class="btn small closebtn" id="modalClose">✕</button>
      ${f.imageUrl? `<img src="${f.imageUrl}" class="fighterImg" onerror="this.style.display='none'">` : ''}
      <h2>${f.name} ${f.nickname||''}</h2>
      ${f.hof? `<div class="hofBadge">🏛 MIEMBRO DEL HALL OF FAME</div>` : ''}
      <div class="badge-row">${fighterStatusPill(f)}<span class="pill">${divName(f.division)}</span><span class="pill">${f.country}</span></div>
      <p class="muted">Edad: ${age} años · Nacido: ${fmtDate(f.dob)} · Debut: ${fmtDate(f.debut)}</p>
      <p>Récord: <b>${f.record.wins}-${f.record.losses}-${f.record.draws}</b> (NC ${f.record.nc})
        · KO ${f.record.koWins} · SUB ${f.record.subWins} · DEC ${f.record.decWins}</p>
      <p class="muted">Peleas en la UFC: <b>${f.record.ufcFights??0}</b> (${f.record.ufcWins??0}-${f.record.ufcLosses??0}) — usado para los rankings${f.record.ufcFights<f.record.wins+f.record.losses+f.record.draws+f.record.nc?'. Resto de la carrera en otras promotoras':''}</p>
      <p class="muted">Bonos: ${f.bonuses.performanceOfNight} Actuación de la Noche · ${f.bonuses.fightOfNight} Pelea de la Noche</p>
      <p class="muted">GOAT score: <b>${goatScore(f)}</b> · Rank score: <b>${f.rankScore.toFixed(1)}</b> · General: <b>${generalScore(f)}</b></p>
      <h3>Atributos</h3>
      ${STAT_KEYS.map(([k,label])=>`<div><div style="display:flex;justify-content:space-between"><span>${label}</span><span>${f.stats[k]}</span></div><div class="statbar"><i style="width:${f.stats[k]}%"></i></div></div>`).join('')}
      <div style="display:flex;justify-content:space-between;margin-top:6px"><span><b>General</b></span><span><b>${generalScore(f)}</b></span></div>
      <div class="statbar"><i style="width:${generalScore(f)}%;background:var(--gold)"></i></div>
      <div style="display:flex;justify-content:space-between;margin-top:6px"><span>Longevidad</span><span>${f.longevity}/100</span></div>
      <div class="statbar"><i style="width:${f.longevity}%;background:${f.longevity<30?'var(--red)':'var(--green)'}"></i></div>
      <h3>Historial de títulos</h3>${reigns}
      <h3>Últimos combates</h3>${fights}
      ${f.injury.active? `<p class="pill injured">Lesión: ${f.injury.note} — vuelve el ${fmtDate(f.injury.untilDate)}</p>`:''}
      <div class="row" style="margin-top:10px">
        <button class="btn gold full" id="editThis">Editar en el Editor →</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalBg').onclick=e=>{ if(e.target.id==='modalBg') closeModal(); };
  document.getElementById('modalClose').onclick=closeModal;
  document.getElementById('editThis').onclick=()=>{ closeModal(); UI.tab='editor'; UI.selectedFighter=f.id; render(); };
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

/* ====================== TÍTULOS ====================== */
function tplTitles(){
  return `<div class="card"><h2>Cinturones</h2>
  ${STATE.titles.map(t=>{
    const holder = STATE.fighters.find(f=>f.id===t.holderId);
    const reign = holder? (holder.titleReigns||[]).find(r=>r.titleId===t.id && !r.lostDate) : null;
    const totalDefenses = t.history.length? t.history.reduce((acc,h)=>{
      const f=STATE.fighters.find(x=>x.id===h.fighterId);
      const r=f? (f.titleReigns||[]).find(rr=>rr.titleId===t.id && rr.wonDate===h.wonDate):null;
      return acc+(r?r.defenses||0:0);
    },0):0;
    return `<div class="fightcard-item clickable" data-title="${t.id}">
      <b>${titleIcon(t)} ${t.name}</b>${t.isInterim?' <span class="pill interim">Interino</span>':''}
      <div class="muted">Campeón: ${holder? holder.name+(t.isInterim?' (interino)':'') : 'Vacante'}${reign? ' · '+(reign.defenses||0)+' defensas en este reinado':''}</div>
      <div class="muted">Reinados históricos: ${t.history.length} · Defensas totales registradas: ${totalDefenses} · <span style="color:var(--blue)">Ver cronología →</span></div>
      ${holder? `<button class="btn small danger" data-vacate="${t.id}">Vacar título (lesión/retiro)</button>`:''}

function openTitleModal(tid){
  const t = STATE.titles.find(x=>x.id===tid); if(!t) return;
  // Construir cronología: cada entrada del historial + sus datos de reinado (fechas, defensas)
  const timeline = (t.history||[]).slice().sort((a,b)=> new Date(a.wonDate)-new Date(b.wonDate)).map((h,idx)=>{
    const f = STATE.fighters.find(x=>x.id===h.fighterId);
    const reign = f? (f.titleReigns||[]).find(r=>r.titleId===t.id && r.wonDate===h.wonDate) : null;
    const lostDate = reign? reign.lostDate : null;
    const defenses = reign? (reign.defenses||0) : 0;
    const isInterim = reign? reign.isInterim : false;
    const durationDays = Math.round((new Date(lostDate||STATE.meta.currentDate) - new Date(h.wonDate))/86400000);
    return `<div class="fightcard-item">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <b>${idx+1}. ${f?f.name:'Desconocido'}</b>${isInterim?' <span class="pill interim">Interino</span>':''}${!lostDate?' <span class="pill champ">Vigente</span>':''}
      </div>
      <div class="muted">${fmtDate(h.wonDate)} → ${lostDate? fmtDate(lostDate) : 'actualidad'} (${durationDays} días) · ${defenses} defensa${defenses!==1?'s':''}</div>
    </div>`;
  }).join('') || '<p class="muted">Este título no ha tenido campeones todavía.</p>';

  document.getElementById('modalRoot').innerHTML = `
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <button class="btn small closebtn" id="modalClose">✕</button>
      <h2>${titleIcon(t)} ${t.name}${t.isInterim?' <span class="pill interim">Interino</span>':''}</h2>
      <p class="muted">${t.divisionId? divName(t.divisionId) : 'Título especial'} · ${(t.history||[]).length} reinado(s) registrado(s)</p>
      <h3>Cronología de campeones</h3>
      ${timeline}
    </div>
  </div>`;
  document.getElementById('modalBg').onclick=e=>{ if(e.target.id==='modalBg') closeModal(); };
  document.getElementById('modalClose').onclick=closeModal;
}

function updateProbDisplay(card){
  const aId = card.querySelector('.evFighterA').value;
  const bId = card.querySelector('.evFighterB').value;
  const disp = card.querySelector('.probDisplay');
  if(!disp) return;
  const fA = STATE.fighters.find(x=>x.id===aId);
  const fB = STATE.fighters.find(x=>x.id===bId);
  if(!fA || !fB || aId===bId){ disp.textContent=''; return; }
  const titleSel = card.querySelector('.evTitle');
  const rounds = (titleSel && titleSel.value)? 5 : 3;
  const p = winProbabilities(fA, fB, rounds);
  disp.innerHTML = `<b>${fA.name}</b> ${p.probA.toFixed(0)}%  —  ${p.probB.toFixed(0)}% <b>${fB.name}</b>`;
}

function fillFighterSelects(card){
  const divSel = card.querySelector('.evDivFilter');
  const aSel = card.querySelector('.evFighterA');
  const bSel = card.querySelector('.evFighterB');
  const divId = divSel.value;
  let pool = STATE.fighters.filter(fighterAvailable);
  if(divId!=='ALL') pool = pool.filter(f=>f.division===divId);
  pool.sort((a,b)=>a.name.localeCompare(b.name));
  const optsHtml = pool.map(f=>`<option value="${f.id}">${f.name} (${divName(f.division).replace('♀ ','♀').replace('♂ ','♂')}, ${f.record.wins}-${f.record.losses})</option>`).join('');
  aSel.innerHTML = optsHtml; bSel.innerHTML = optsHtml;
  if(pool.length>1) bSel.selectedIndex=1;
  aSel.onchange = ()=> updateProbDisplay(card);
  bSel.onchange = ()=> updateProbDisplay(card);
  updateProbDisplay(card);
}

/* ====================== ESTADÍSTICAS ====================== */
function tplStats(){
  const divFilter = UI.statsDiv || 'ALL';
  const all = divFilter==='ALL'? STATE.fighters : STATE.fighters.filter(f=>f.division===divFilter);
  // Nota: KO, sumisiones, victorias y % de finalización usan SOLO datos de la UFC (campos editables en el Editor)
  const topKO = all.slice().sort((a,b)=>ufcKoWinsOf(b)-ufcKoWinsOf(a)).slice(0,8);
  const topSub = all.slice().sort((a,b)=>ufcSubWinsOf(b)-ufcSubWinsOf(a)).slice(0,8);
  const topWins = all.slice().sort((a,b)=>ufcWinsOf(b)-ufcWinsOf(a)).slice(0,8);
  const topFOTN = all.slice().sort((a,b)=>b.bonuses.fightOfNight-a.bonuses.fightOfNight).slice(0,8);
  const topPOTN = all.slice().sort((a,b)=>b.bonuses.performanceOfNight-a.bonuses.performanceOfNight).slice(0,8);

  // Más defensas de título (suma de todas las defensas en todos sus reinados)
  const totalDefenses = f => (f.titleReigns||[]).reduce((a,r)=>a+(r.defenses||0),0);
  const topDefenses = all.slice().sort((a,b)=>totalDefenses(b)-totalDefenses(a)).slice(0,8);

  // Mejor racha de victorias actual (contar victorias consecutivas desde el final del historial)
  function currentStreak(f){
    // Recorre el historial de combates de más reciente a más antiguo
    const history = [...(f.fightHistory||[])].reverse();
    let streak=0;
    for(const fid of history){
      let found=null;
      for(const ev of STATE.events){ const ft=ev.card.find(x=>x.id===fid); if(ft&&ft.result){found=ft;break;} }
      if(!found||!found.result) break;
      if(found.result.winnerId===f.id) streak++;
      else break;
    }
    return streak;
  }
  const topStreak = all.filter(f=>f.record.wins>0).slice().sort((a,b)=>currentStreak(b)-currentStreak(a)).slice(0,8);

  // Mayor número de peleas en la UFC
  const ufcFightsOf = f => f.record.ufcFights!=null? f.record.ufcFights : (f.record.wins+f.record.losses+f.record.draws+f.record.nc);
  const topFights = all.slice().sort((a,b)=>ufcFightsOf(b)-ufcFightsOf(a)).slice(0,8);

  // Mejor porcentaje de finalizaciones EN LA UFC (KO+SUB / victorias UFC, mín 5 victorias UFC)
  const finishRate = f => ufcWinsOf(f)>=5? Math.round((ufcKoWinsOf(f)+ufcSubWinsOf(f))/ufcWinsOf(f)*100):0;
  const topFinish = all.filter(f=>ufcWinsOf(f)>=5).slice().sort((a,b)=>finishRate(b)-finishRate(a)).slice(0,8);

  // Más reinados de título
  const totalReigns = f => (f.titleReigns||[]).length;
  const topReigns = all.slice().sort((a,b)=>totalReigns(b)-totalReigns(a)).slice(0,8);

  // Mayor GOAT score
  const topGoat = all.slice().sort((a,b)=>goatScore(b)-goatScore(a)).slice(0,8);

  // Mayor atributo General (media de stats)
  const topGeneral = all.slice().sort((a,b)=>generalScore(b)-generalScore(a)).slice(0,8);

  const block=(title,list,fmt,extra='')=>`<div class="card"><h3>${title}${extra}</h3><table><tbody>
    ${list.filter(f=>fmt(f)>0).map((f,i)=>`<tr><td>${i+1}</td><td>${f.name}${f.status==='retired'?' <span class="muted">(ret.)</span>':''}</td><td><b>${fmt(f)}</b></td></tr>`).join('')||'<tr><td class="muted">Sin datos aún</td></tr>'}
  </tbody></table></div>`;

  return `
  <div class="card"><h2>Estadísticas de la liga</h2>
  <p class="muted">${STATE.events.filter(e=>e.status==='completed').length} eventos celebrados · Las victorias, KO, sumisiones y % de finalización mostrados aquí son <b>solo de la UFC</b> (los campos "peleas/victorias/derrotas UFC" del Editor).</p>
  <label>Filtrar por categoría</label>
  <select id="statsDivSel"><option value="ALL" ${divFilter==='ALL'?'selected':''}>Todas las categorías</option>${DIVISIONS.map(d=>`<option value="${d.id}" ${divFilter===d.id?'selected':''}>${divName(d.id)}</option>`).join('')}</select>
  </div>
  ${block('Más victorias (UFC)',topWins,ufcWinsOf)}
  ${block('Más KO/TKO (UFC)',topKO,ufcKoWinsOf)}
  ${block('Más sumisiones (UFC)',topSub,ufcSubWinsOf)}
  ${block('Más defensas de título',topDefenses,totalDefenses,' 🛡️')}
  ${block('Racha de victorias actual',topStreak,currentStreak,' 🔥')}
  ${block('Más reinados de título',topReigns,totalReigns,' 👑')}
  ${block('Mayor % de finalizaciones (UFC)',topFinish,f=>finishRate(f)+'%',' (mín. 5 victorias UFC)')}
  ${block('Más peleas en la UFC',topFights,ufcFightsOf)}
  ${block('Mayor GOAT Score',topGoat,goatScore,' 🐐')}
  ${block('Mejor atributo General',topGeneral,generalScore,' ⭐')}
  ${block('Más Pelea de la Noche 🌟',topFOTN,f=>f.bonuses.fightOfNight)}
  ${block('Más Actuación de la Noche ⭐',topPOTN,f=>f.bonuses.performanceOfNight)}
  `;
}

  const sel = document.getElementById('statsDivSel');
  if(sel) sel.onchange=()=>{ UI.statsDiv = sel.value; render(); };
}

function tplActivity(){

/* ====================== EDITOR DE RANKINGS MANUALES ====================== */
function tplRankEditor(){
  const scope = UI.rankEditScope || 'P4P';
  const isP4P = scope==='P4P';
  const pool = isP4P
    ? STATE.fighters.filter(f=>f.status==='active' || f.status==='injured')
    : STATE.fighters.filter(f=>f.division===scope && f.status!=='retired');
  const sorted = pool.slice().sort((a,b)=>{
    const am = isP4P? a.manualRankP4P : a.manualRankDivision;
    const bm = isP4P? b.manualRankP4P : b.manualRankDivision;
    if(am!=null && bm!=null) return am-bm;
    if(am!=null) return -1;
    if(bm!=null) return 1;
    return b.rankScore-a.rankScore;
  }).slice(0,20);

  return `
  <h3>📊 Editar rankings (manual)</h3>
  <p class="muted">Fija a mano la posición de un peleador en el P4P o en el ranking de su categoría. Deja el campo vacío para que vuelva a calcularse automáticamente.</p>
  <select id="rankEditScopeSel">
    <option value="P4P" ${isP4P?'selected':''}>Pound-for-Pound</option>
    ${DIVISIONS.map(d=>`<option value="${d.id}" ${scope===d.id?'selected':''}>${divName(d.id)}</option>`).join('')}
  </select>
  <table style="margin-top:8px"><thead><tr><th>#</th><th>Nombre</th><th>Score auto</th><th>Posición manual</th></tr></thead><tbody>
  ${sorted.map((f,i)=>{
    const manual = isP4P? f.manualRankP4P : f.manualRankDivision;
    return `<tr>
      <td>${i+1}</td>
      <td>${f.name}${championBadge(f.id)}</td>
      <td class="muted">${f.rankScore.toFixed(1)}</td>
      <td><input type="number" min="1" max="20" class="rankPosInput" data-fid="${f.id}" value="${manual??''}" placeholder="auto" style="width:70px;margin:0"></td>
    </tr>`;
  }).join('')}
  </tbody></table>
  <div class="row" style="margin-top:8px">
    <button class="btn primary full" id="saveRankPositions">💾 Guardar posiciones</button>
    <button class="btn danger full" id="clearRankPositions">Quitar todas las fijaciones de esta lista</button>
  </div>
  `;
}
function bindRankEditor(){
  const scopeSel = document.getElementById('rankEditScopeSel');
  if(!scopeSel) return;
  scopeSel.onchange = ()=>{ UI.rankEditScope = scopeSel.value; render(); };

  document.getElementById('saveRankPositions').onclick=()=>{
    const isP4P = (UI.rankEditScope||'P4P')==='P4P';
    document.querySelectorAll('.rankPosInput').forEach(inp=>{
      const f = STATE.fighters.find(x=>x.id===inp.dataset.fid);

      const v = inp.value.trim();
      const pos = v===''? null : clamp(parseInt(v)||1,1,99);

    });
    refreshRankings(); saveLocal(); render(); toast('Posiciones de ranking guardadas ✅');
  };
  document.getElementById('clearRankPositions').onclick=()=>{
    const isP4P = (UI.rankEditScope||'P4P')==='P4P';
    STATE.fighters.forEach(f=>{ if(isP4P) f.manualRankP4P=null; else f.manualRankDivision=null; });
    refreshRankings(); saveLocal(); render(); toast('Fijaciones eliminadas, ranking automático restaurado');
  };
}

function bindEditor(){
  document.getElementById('editFighterSel').onchange=e=>{ UI.selectedFighter=e.target.value||null; render(); };
  bindRankEditor();

  // Guardar datos básicos del peleador
  document.getElementById('saveFighterBtn').onclick=()=>{
    const get=id=>document.getElementById(id).value;
    const stats={}; STAT_KEYS.forEach(([k])=> stats[k]=clamp(parseInt(document.getElementById('fld_stat_'+k).value)||50,1,99));
    let f = UI.selectedFighter? STATE.fighters.find(x=>x.id===UI.selectedFighter): null;
    if(!f){ f = {id:uid('F'), fightHistory:[], titleReigns:[], bonuses:{fightOfNight:0,performanceOfNight:0}, injury:{active:false,untilDate:null,note:''}, lastEventSeq:null, rankScore:0}; STATE.fighters.push(f); }
    f.name=get('fld_name'); f.nickname=get('fld_nick')||null; f.gender=get('fld_gender'); f.country=get('fld_country');
    f.dob=get('fld_dob'); f.debut=get('fld_debut'); f.division=get('fld_division'); f.status=get('fld_status');
    f.imageUrl = get('fld_image').trim()||null;
    f.stats=stats; f.longevity=clamp(parseInt(get('fld_longevity'))||0,0,100);
    f.record = {
      wins: parseInt(get('fld_w'))||0, losses: parseInt(get('fld_l'))||0, draws: parseInt(get('fld_dr'))||0, nc: f.record?f.record.nc:0,
      koWins: parseInt(get('fld_kow'))||0, subWins: parseInt(get('fld_subw'))||0, decWins: parseInt(get('fld_decw'))||0,
      koLosses: parseInt(get('fld_kol'))||0, subLosses: parseInt(get('fld_subl'))||0, decLosses: parseInt(get('fld_decl'))||0,
      ufcFights: parseInt(get('fld_ufcfights'))||0,
      ufcWins: parseInt(get('fld_ufcwins'))||0,
      ufcLosses: parseInt(get('fld_ufclosses'))||0,
      ufcKoWins: parseInt(get('fld_ufckow'))||0,
      ufcSubWins: parseInt(get('fld_ufcsubw'))||0,
      ufcDecWins: parseInt(get('fld_ufcdecw'))||0,
      ufcKoLosses: parseInt(get('fld_ufckol'))||0,
      ufcSubLosses: parseInt(get('fld_ufcsubl'))||0,
      ufcDecLosses: parseInt(get('fld_ufcdecl'))||0
    };
    f.hof = document.getElementById('fld_hof').checked;
    if(f.status==='injured' && !f.injury.active){ f.injury={active:true, untilDate:addDays(STATE.meta.currentDate,60), note:'Editado manualmente'}; }
    if(f.status!=='injured'){ f.injury.active=false; }
    refreshRankings(); saveLocal(); UI.selectedFighter=f.id; render(); toast('Peleador guardado ✅');
  };

  const delBtn=document.getElementById('deleteFighterBtn');
  if(delBtn) delBtn.onclick=()=>{
    if(!confirm('¿Eliminar este peleador definitivamente?')) return;
    STATE.fighters = STATE.fighters.filter(x=>x.id!==UI.selectedFighter);
    UI.selectedFighter=null; saveLocal(); render(); toast('Peleador eliminado');
  };

  // Guardar bonos
  const saveBonusesBtn = document.getElementById('saveBonusesBtn');
  if(saveBonusesBtn) saveBonusesBtn.onclick=()=>{
    const f = STATE.fighters.find(x=>x.id===UI.selectedFighter); if(!f) return;
    f.bonuses.fightOfNight = parseInt(document.getElementById('fld_fotn').value)||0;
    f.bonuses.performanceOfNight = parseInt(document.getElementById('fld_potn').value)||0;
    saveLocal(); toast('Bonos guardados ✅');
  };

  // Reinados: guardar individual
  document.querySelectorAll('[data-savereign]').forEach(btn=>{
    btn.onclick=()=>{
      const f = STATE.fighters.find(x=>x.id===UI.selectedFighter); if(!f) return;
      const idx = parseInt(btn.dataset.savereign);
      const r = f.titleReigns[idx]; if(!r) return;
      r.wonDate = document.getElementById(`reign_won_${idx}`).value || r.wonDate;
      r.lostDate = document.getElementById(`reign_lost_${idx}`).value || null;
      r.defenses = parseInt(document.getElementById(`reign_def_${idx}`).value)||0;
      r.isInterim = document.getElementById(`reign_interim_${idx}`).value==='1';
      // Sincronizar titular del cinturón: si lostDate es null, este peleador es el campeón actual
      syncTitleHolder(f, r);
      rebuildTitleHistory(r.titleId);
      saveLocal(); render(); toast('Reinado guardado ✅');
    };
  });

  // Reinados: eliminar
  document.querySelectorAll('[data-delreign]').forEach(btn=>{
    btn.onclick=()=>{
      const f = STATE.fighters.find(x=>x.id===UI.selectedFighter); if(!f) return;
      const idx = parseInt(btn.dataset.delreign);
      const r = f.titleReigns[idx];
      let affectedTitleId = r? r.titleId : null;
      if(r){
        // Si era el campeón vigente, vacar el cinturón
        const title = STATE.titles.find(t=>t.id===r.titleId);
        if(title && title.holderId===f.id && !r.lostDate){ title.holderId=null; title.isInterim=false; }
      }
      f.titleReigns.splice(idx,1);
      if(affectedTitleId) rebuildTitleHistory(affectedTitleId);
      saveLocal(); render(); toast('Reinado eliminado');
    };
  });

  // Reinados: añadir nuevo
  const addReignBtn = document.getElementById('addReignBtn');
  if(addReignBtn) addReignBtn.onclick=()=>{
    const f = STATE.fighters.find(x=>x.id===UI.selectedFighter); if(!f) return;
    const titleId = document.getElementById('newReign_title').value;
    const wonDate = document.getElementById('newReign_won').value || STATE.meta.currentDate;
    const lostDate = document.getElementById('newReign_lost').value || null;
    const defenses = parseInt(document.getElementById('newReign_def').value)||0;
    const isInterim = document.getElementById('newReign_interim').value==='1';
    if(!titleId) return toast('Selecciona un título');
    const newReign = {titleId, wonDate, lostDate, defenses, isInterim};
    f.titleReigns = f.titleReigns||[];
    f.titleReigns.push(newReign);
    syncTitleHolder(f, newReign);
    rebuildTitleHistory(titleId);
    saveLocal(); render(); toast('Reinado añadido ✅');
  };

  // Gestión directa de titulares
  document.querySelectorAll('[data-settitle]').forEach(btn=>{
    btn.onclick=()=>{
      const titleId = btn.dataset.settitle;
      const title = STATE.titles.find(t=>t.id===titleId); if(!title) return;
      const newHolderId = document.getElementById(`titleHolder_${titleId}`).value||null;
      const newInterim = document.getElementById(`titleInterim_${titleId}`).checked;
      // Cerrar reinado del campeón anterior si existe
      if(title.holderId && title.holderId!==newHolderId){
        const prev = STATE.fighters.find(x=>x.id===title.holderId);
        if(prev){ const r=(prev.titleReigns||[]).find(rr=>rr.titleId===titleId&&!rr.lostDate); if(r) r.lostDate=STATE.meta.currentDate; }
      }
      title.holderId = newHolderId;
      title.isInterim = newInterim;
      // Si hay nuevo campeón, abrir o añadir un reinado sin fecha de pérdida
      let nf = null;
      if(newHolderId){
        nf = STATE.fighters.find(x=>x.id===newHolderId);
        if(nf){
          const existing = (nf.titleReigns||[]).find(r=>r.titleId===titleId&&!r.lostDate);
          if(!existing){
            nf.titleReigns = nf.titleReigns||[];
            const wonDate = STATE.meta.currentDate;
            nf.titleReigns.push({titleId, wonDate, lostDate:null, defenses:0, isInterim:newInterim});
          } else {
            existing.isInterim = newInterim;
          }
        }
        logEvent(`🏆 ${nf?nf.name:'?'} asignado como ${newInterim?'campeón interino':'campeón'} de ${title.name} (Editor).`);
      } else {
        logEvent(`⚠️ ${title.name} vacado desde el Editor.`);
      }
      rebuildTitleHistory(titleId);
      saveLocal(); render(); toast('Titular actualizado ✅');
    };
  });

  document.getElementById('delEventBtn').onclick=()=>{
    const id=document.getElementById('delEventSel').value; if(!id) return;
    STATE.events = STATE.events.filter(x=>x.id!==id); saveLocal(); render(); toast('Evento eliminado');
  };
  document.getElementById('applyJson').onclick=()=>{
    try{
      const parsed = JSON.parse(document.getElementById('rawJson').value);
      STATE = parsed; saveLocal(); render(); toast('Estado aplicado desde JSON');
    }catch(e){ toast('JSON inválido: '+e.message, 4000); }
  };
  document.getElementById('refreshJson').onclick=()=> render();
}

// Sincroniza el titular de un cinturón cuando se edita un reinado
function syncTitleHolder(fighter, reign){
  const title = STATE.titles.find(t=>t.id===reign.titleId); if(!title) return;
  if(!reign.lostDate){
    // Este peleador tiene el cinturón vigente — cerrar reinado anterior si era otro
    if(title.holderId && title.holderId!==fighter.id){
      const prev = STATE.fighters.find(x=>x.id===title.holderId);
      if(prev){ const r=(prev.titleReigns||[]).find(rr=>rr.titleId===reign.titleId&&!rr.lostDate); if(r) r.lostDate=STATE.meta.currentDate; }
    }
    title.holderId = fighter.id;
    title.isInterim = reign.isInterim||false;
  } else {
    // Reinado cerrado — si este peleador era el titular, vacar
    if(title.holderId===fighter.id) title.holderId=null;
  }
}

// Reconstruye por completo el historial (cronología) y el titular de un título a partir de los
// titleReigns de TODOS los peleadores. Se llama tras cualquier edición de reinados en el Editor
// para que la cronología que se ve al pulsar el título esté siempre al día.
function rebuildTitleHistory(titleId){
  const title = STATE.titles.find(t=>t.id===titleId); if(!title) return;
  const entries = [];
  let activeHolder = null, activeInterim = false;
  STATE.fighters.forEach(f=>{
    (f.titleReigns||[]).filter(r=>r.titleId===titleId).forEach(r=>{
      entries.push({fighterId:f.id, wonEventId:null, wonDate:r.wonDate});
      if(!r.lostDate){ activeHolder=f.id; activeInterim=r.isInterim||false; }
    });
  });
  entries.sort((a,b)=> new Date(a.wonDate)-new Date(b.wonDate));
  title.history = entries;
  title.holderId = activeHolder;
  title.isInterim = activeInterim;
  const div = STATE.divisions.find(d=>d.id===title.divisionId);
  if(div) div.championId = activeHolder;
}

    <label>Repositorio</label><input id="cfgRepo" value="${cfg.repo||''}" placeholder="ufc-owner-sim">
    <label>Rama</label><input id="cfgBranch" value="${cfg.branch||'main'}">
    <label>Ruta del fichero</label><input id="cfgPath" value="${cfg.path||'data/state.json'}">
    <label>Personal Access Token</label><input id="cfgToken" type="password" value="${cfg.token||''}" placeholder="ghp_xxxxx...">
    <button class="btn full" id="saveCfg">Guardar configuración</button>
    <div class="row" style="margin-top:10px">
      <button class="btn primary full" id="pushBtn">⬆ Guardar partida en GitHub</button>
      <button class="btn full" id="pullBtn">⬇ Cargar partida desde GitHub</button>
    </div>
    <p class="muted" id="ghStatus"></p>
  </div>
  <div class="card">
    <h3>Datos locales</h3>
    <div class="row">
      <button class="btn full" id="newGameBtn">🔄 Nueva partida (resetear con 2 por categoría)</button>
      <button class="btn full" id="exportBtn">📤 Exportar JSON (descargar)</button>
    </div>
  </div>`;
}
function bindSettings(){
  document.getElementById('saveCfg').onclick=()=>{
    setCfg({owner:val('cfgOwner'),repo:val('cfgRepo'),branch:val('cfgBranch')||'main',path:val('cfgPath')||'data/state.json',token:val('cfgToken')});
    toast('Configuración guardada');
  };
  function val(id){return document.getElementById(id).value.trim();}
  document.getElementById('pushBtn').onclick=async()=>{
    const cfg=getCfg(); const status=document.getElementById('ghStatus');
    if(!cfg.owner||!cfg.repo||!cfg.token){ status.textContent='Falta configuración (usuario/repo/token).'; return; }
    status.textContent='Guardando...';
    try{
      const apiUrl=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`;
      let sha=null;
      const getRes = await fetch(apiUrl+`?ref=${cfg.branch}`, {headers:{Authorization:`token ${cfg.token}`}});
      if(getRes.status===200){ const j=await getRes.json(); sha=j.sha; }
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(STATE,null,1))));
      const putRes = await fetch(apiUrl, {
        method:'PUT', headers:{Authorization:`token ${cfg.token}`, 'Content-Type':'application/json'},
        body: JSON.stringify({message:`Guardado partida ${STATE.meta.currentDate}`, content, sha: sha||undefined, branch:cfg.branch})
      });
      if(putRes.ok){ status.textContent='✅ Guardado correctamente en GitHub.'; toast('Partida guardada en GitHub'); }
      else { const e=await putRes.json(); status.textContent='❌ Error: '+(e.message||putRes.status); }
    }catch(e){ status.textContent='❌ Error de red: '+e.message; }
  };
  document.getElementById('pullBtn').onclick=async()=>{
    const cfg=getCfg(); const status=document.getElementById('ghStatus');
    if(!cfg.owner||!cfg.repo){ status.textContent='Falta configuración (usuario/repo).'; return; }
    status.textContent='Cargando...';
    try{
      const raw=`https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/${cfg.branch}/${cfg.path}`;
      const res = await fetch(raw+`?t=${Date.now()}`);
      if(!res.ok){ status.textContent='❌ No se encontró el fichero en el repo.'; return; }
      const json = await res.json();
      STATE=json; saveLocal(); render();
      status.textContent='✅ Partida cargada desde GitHub.'; toast('Partida cargada');
    }catch(e){ status.textContent='❌ Error: '+e.message; }
  };
  document.getElementById('newGameBtn').onclick=()=>{
    if(!confirm('Esto borrará tu partida actual y generará 2 peleadores por categoría. ¿Continuar?')) return;
    STATE=freshState(); seedFighters(); render(); toast('Nueva partida generada');
  };
  document.getElementById('exportBtn').onclick=()=>{
    const blob=new Blob([JSON.stringify(STATE,null,1)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ufc_state.json'; a.click();
  };
}

/* ====================== INIT ====================== */
async function init(){
  const local = loadLocal();
  if(local){ STATE=local; }
  else {
    STATE=freshState();
    seedFighters();
  }
  refreshRankings();
  render();
}
init();
</script>
</body>
</html>
